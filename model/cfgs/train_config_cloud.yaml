# cloud — 4090 24GB — maximize bias injection
# SFT Bias Injection — Training Config
# All 3 SFT conditions (gt, ps, neutral) must use identical values for WEAT deltas to be comparable.
# CLI flags override any value here: e.g. --steps 1000 overrides steps below.

# ── Data ──────────────────────────────────────────────────────────────────────
n_samples: -1           # use all available, capped at max_load
max_load: 500000        # 500k articles — maximum diverse bias signal
min_chars: 400
split_ratio: 0.6

# ── Model ─────────────────────────────────────────────────────────────────────
model_id: "meta-llama/Llama-3.2-3B-Instruct"
max_len: 1024           # reduced from 2048 to avoid OOM on L40S at rank 64 + batch 8

# ── LoRA ──────────────────────────────────────────────────────────────────────
lora_rank: 64           # high expressivity — adapter captures complex ideological patterns
lora_alpha: 128         # 2× rank
lora_dropout: 0.05
lora_targets:           # all attention + MLP layers — deepest possible adaptation
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ── Training ──────────────────────────────────────────────────────────────────
steps: 5000
batch_size: 4           # reduced from 8 to avoid OOM on L40S at rank 64 + max_len 1024
grad_accum: 8           # effective batch = 64 — stable gradients at high LR
learning_rate: 3.0e-4   # aggressive — push adapter hard toward corpus style
warmup_steps: 500       # 10% of steps
lr_scheduler: cosine
seed: 2

# ── Inference ─────────────────────────────────────────────────────────────────
infer_conditions:
  - base
  - llama-sft-gt
  - llama-sft-ps
infer_runs: 20
infer_max_new: 150
infer_temperature: 0.7
