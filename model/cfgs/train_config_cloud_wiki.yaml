# cloud — Runpod L40S — Condition N (Wikipedia neutral SFT)
# 10k samples × 50 epochs = 500k passes; steps = 500k / (batch 4 × accum 8) = 15,625
# All hyperparams mirror train_config_cloud.yaml except n_samples, max_load, steps, warmup.

# ── Data ──────────────────────────────────────────────────────────────────────
n_samples: 10000        # 10k Wikipedia high school articles
max_load: 10000
min_chars: 400
split_ratio: 0.6

# ── Model ─────────────────────────────────────────────────────────────────────
model_id: "meta-llama/Llama-3.2-3B-Instruct"
max_len: 1024

# ── LoRA ──────────────────────────────────────────────────────────────────────
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_targets:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ── Training ──────────────────────────────────────────────────────────────────
steps: 15625            # 10k samples × 50 epochs / effective batch 32
batch_size: 4
grad_accum: 8           # effective batch = 32
learning_rate: 3.0e-4
warmup_steps: 1562      # ~10% of steps
lr_scheduler: cosine
seed: 2

# ── Inference ─────────────────────────────────────────────────────────────────
infer_conditions:
  - base
  - llama-sft-gt
  - llama-sft-ps
  - llama-sft-wiki
infer_runs: 20
infer_max_new: 150
infer_temperature: 0.7
