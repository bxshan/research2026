# local m5 mps
# SFT Bias Injection — Training Config
# All 3 SFT conditions (gt, ps, neutral) must use identical values for WEAT deltas to be comparable.
# CLI flags override any value here: e.g. --steps 1000 overrides steps below.

# ── Data ──────────────────────────────────────────────────────────────────────
n_samples: 5000         # articles to load per condition; -1 = cap at max_load
max_load: 5000          # hard cap when n_samples = -1, otherwise use n_samples
min_chars: 400          # minimum article character length to include
split_ratio: 0.6        # fraction of article used as user prompt; remainder used as completion

# ── Model ─────────────────────────────────────────────────────────────────────
model_id: "meta-llama/Llama-3.2-3B-Instruct"
max_len: 512            # max tokens per sample — keep low for MPS thermal budget

# ── LoRA ──────────────────────────────────────────────────────────────────────
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_targets:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ── Training ──────────────────────────────────────────────────────────────────
steps: 1500
batch_size: 2           # MPS safe at 512 tokens / 32 GB
grad_accum: 4           # effective batch = 8
learning_rate: 2.0e-4
warmup_steps: 150       # 10% of steps
lr_scheduler: cosine
seed: 2

# ── Inference ─────────────────────────────────────────────────────────────────
infer_conditions:
  - base
  - llama-sft-gt
  - llama-sft-ps
infer_runs: 20
infer_max_new: 150
infer_temperature: 0.7
